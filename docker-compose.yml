services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_DB_NAME:-multi_gateway}
      
      MYSQL_USER: app
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    ports:
      - "3307:3306"  
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3333:3333"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MIGRATE: "true"
      SEED: "true"
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:3333}
      SESSION_DRIVER: cookie
      
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: app
      GATEWAY1_BASE_URL: http://gateways:3001
      GATEWAY2_BASE_URL: http://gateways:3002
    depends_on:
      mysql:
        condition: service_healthy
      gateways:
        condition: service_started

  
  gateways:
    image: matheusprotzen/gateways-mock
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      REMOVE_AUTH: "true"
